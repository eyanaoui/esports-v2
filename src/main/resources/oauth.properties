# Google OAuth 2.0 Configuration
# Replace these values with your actual Google Cloud credentials

# Get these from: https://console.cloud.google.com/apis/credentials
google.client.id=YOUR_CLIENT_ID_HERE.apps.googleusercontent.com
google.client.secret=YOUR_CLIENT_SECRET_HERE

# Redirect URI (must match the one configured in Google Cloud Console)
google.redirect.uri=http://localhost:8080/oauth/callback

# OAuth scopes
google.scope=openid email profile
